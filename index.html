<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard Estratégico · Megalabs Uruguay OTC</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#080b12;--bg1:#0f1117;--bg2:#1e2130;--bg3:#2a2d3a;
  --t1:#e8eaf0;--t2:#c0c3d4;--t3:#8b8fa8;--t4:#555a75;
  --green:#00d4aa;--red:#e63946;--orange:#f4a261;--blue:#457b9d;--purple:#8338ec;
}
body{background:var(--bg0);color:var(--t1);font-family:'DM Sans','Segoe UI',sans-serif;font-size:14px}
button{font-family:inherit;cursor:pointer}
select{font-family:inherit}
input[type=file]{display:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
textarea{font-family:monospace;resize:vertical}

.shell{min-height:100vh;padding:20px}
.header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:12px}
.logo{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.logo span{font-size:11px;letter-spacing:3px;color:var(--green);text-transform:uppercase;font-weight:600}
h1{font-size:22px;font-weight:700;color:#fff}
.subtitle{color:var(--t4);font-size:12px;margin-top:3px}

.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.range-box{display:flex;align-items:center;gap:8px;background:var(--bg1);border:1px solid var(--bg2);border-radius:10px;padding:8px 12px}
select{background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;color:var(--t1);font-size:12px;padding:4px 8px}
.btn{padding:8px 14px;border-radius:8px;border:1px solid var(--bg3);background:var(--bg2);color:var(--t3);font-size:12px;font-weight:600;transition:all .15s}
.btn:hover{border-color:var(--t3);color:var(--t2)}
.btn.accent{border-color:var(--green);background:#00d4aa15;color:var(--green)}
.btn.danger{border-color:#e6394644;color:var(--red)}
.btn.sm{padding:4px 10px;font-size:11px;font-weight:400}

.alert-banner{padding:8px 14px;border-radius:8px;font-size:12px;margin-bottom:12px}
.alert-banner.ok{background:#00d4aa15;border:1px solid #00d4aa44;color:var(--green)}
.alert-banner.err{background:#e6394615;border:1px solid #e6394644;color:var(--red)}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi{background:var(--bg1);border:1px solid var(--bg2);border-radius:12px;padding:14px 16px}
.kpi-label{font-size:10px;color:var(--t4);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.kpi-value{font-size:20px;font-weight:700;margin-bottom:3px}
.kpi-sub{font-size:11px;color:var(--t4)}

.tabs{display:flex;gap:3px;margin-bottom:16px;background:var(--bg1);border:1px solid var(--bg2);border-radius:10px;padding:4px;width:fit-content;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:7px;border:none;background:transparent;color:var(--t4);font-size:12px;font-weight:500;transition:all .15s}
.tab.active{background:var(--green);color:#080b12}
.tab:hover:not(.active){color:var(--t2)}

.card{background:var(--bg1);border:1px solid var(--bg2);border-radius:12px;padding:18px}
.card-title{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.gap{display:grid;gap:14px}

.bar-row{margin-bottom:10px}
.bar-row-head{display:flex;justify-content:space-between;margin-bottom:3px;font-size:11px}
.bar-row-name{color:var(--t2)}
.bar-row-val{font-weight:600}
.bar-track{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .3s}

.alert-section-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.alerts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:16px}
.alert-card{border-radius:10px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
.alert-card .icon{font-size:20px;flex-shrink:0}
.alert-card .title{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:3px}
.alert-card .detail{font-size:11px;color:var(--t3);line-height:1.5}

.yoy-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.yoy-card{background:var(--bg0);border-radius:8px;padding:12px 14px}
.yoy-card .name{font-size:10px;color:var(--t4);margin-bottom:4px}
.yoy-card .pct{font-size:18px;font-weight:700}
.yoy-card .abs{font-size:10px;color:var(--t4)}

.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.chip{padding:4px 10px;border-radius:20px;border:1px solid var(--bg2);background:transparent;color:var(--t4);font-size:11px;transition:all .15s}

.canal-card{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg0);border-radius:8px;margin-bottom:8px}

.pie-legend{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.pie-legend-row{display:flex;align-items:center;gap:8px;font-size:12px}
.pie-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{font-size:10px;color:var(--t4);text-transform:uppercase;letter-spacing:1px;padding:8px 10px;border-bottom:1px solid var(--bg2);text-align:left;font-weight:700}
.data-table td{padding:9px 10px;border-bottom:1px solid var(--bg0)}
.data-table tr:nth-child(even) td{background:var(--bg0)}

.chart-wrap{position:relative;width:100%}
canvas{display:block;width:100%!important}

.modal-bg{position:fixed;inset:0;background:rgba(8,11,18,.96);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px}
.modal{background:var(--bg1);border:1px solid var(--bg3);border-radius:16px;padding:28px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:17px;font-weight:700;color:#fff;margin-bottom:4px}
.modal .sub{font-size:11px;color:var(--t4);margin-bottom:18px}
.info-box{background:var(--bg0);border:1px solid var(--bg2);border-radius:8px;padding:12px 16px;font-size:11px;color:var(--t4);line-height:2;margin-bottom:14px}
.info-box strong{color:var(--orange)}
.info-box em{color:#7c83f5;font-style:normal}
.drop-zone{border:2px dashed var(--bg3);border-radius:10px;padding:22px 16px;text-align:center;cursor:pointer;margin-bottom:12px;transition:all .2s}
.drop-zone:hover,.drop-zone.drag{border-color:var(--green);background:#00d4aa08}
.drop-zone .dz-icon{font-size:28px;margin-bottom:6px}
.drop-zone .dz-text{font-size:13px;color:var(--t3);font-weight:500}
.drop-zone .dz-sub{font-size:11px;color:var(--t4);margin-top:4px}
.sep-label{text-align:center;color:var(--t4);font-size:11px;margin:8px 0}
textarea.paste-area{width:100%;height:140px;background:var(--bg0);border:1px solid #00d4aa44;border-radius:8px;color:var(--t1);font-size:11px;padding:12px;outline:none}
.modal-footer{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}
.btn-primary{background:var(--green);border:none;border-radius:8px;color:#080b12;font-size:13px;font-weight:700;padding:8px 24px}
.btn-primary:disabled{background:var(--bg2);color:var(--t4);cursor:default}

@media(max-width:700px){
  .kpis{grid-template-columns:1fr 1fr}
  .grid2{grid-template-columns:1fr}
  .grid3{grid-template-columns:1fr}
}

.detail-modal{background:var(--bg1);border:1px solid var(--bg3);border-radius:16px;width:100%;max-width:780px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column}
.detail-header{padding:18px 24px;border-bottom:1px solid var(--bg2);display:flex;align-items:center;gap:12px;background:var(--bg1);border-radius:16px 16px 0 0}
.detail-body{padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:24px}
.detail-section-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.sku-row{margin-bottom:12px}
.sku-name{font-size:12px;color:var(--t2);margin-bottom:4px}
.sku-meta{display:flex;gap:10px;align-items:center;margin-bottom:4px;flex-wrap:wrap}
.sku-val{font-size:13px;font-weight:700}
.sku-badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700}
.sku-track{height:5px;background:var(--bg2);border-radius:3px;overflow:hidden}
.sku-fill{height:100%;border-radius:3px}
.canal-row{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-radius:8px;margin-bottom:8px}
.month-tabs{display:flex;gap:3px;margin-bottom:14px;background:var(--bg0);border-radius:8px;padding:3px;width:fit-content}
.month-tab{padding:4px 12px;border-radius:6px;border:none;background:transparent;color:var(--t4);font-size:11px;cursor:pointer;font-weight:500}
.month-tab.active{background:var(--bg2);color:var(--t1)}
.btn-detail{padding:5px 12px;border-radius:6px;border:1px solid #e6394666;background:transparent;color:#e63946;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.btn-detail:hover{background:#e6394618}
@media(max-width:600px){.detail-body{grid-template-columns:1fr}}
</style>
</head>

function fmt(v){if(v==null)return'-';const abs=Math.abs(v);if(abs>=1e6)return(v/1e6).toFixed(1)+'M';if(abs>=1e3)return(v/1e3).toFixed(0)+'K';return v.toFixed(0);}

function mTotal(m,MON){return Object.values(MON[m]||{}).reduce((s,v)=>s+v,0);}
function h(tag,props,...children){

function detectSep(l){const t=(l.match(/\t/g)||[]).length,c=(l.match(/,/g)||[]).length,s=(l.match(/;/g)||[]).length;if(t>=c&&t>=s)return'\t';if(s>c)return';';return',';}
function splitLine(line,sep){const res=[];let inQ=false,cur='';for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"')inQ=!inQ;else if(ch===sep&&!inQ){res.push(cur.trim());cur='';}else cur+=ch;}res.push(cur.trim());return res;}
function parseNum(s){if(!s)return 0;s=String(s).replace(/[$\s]/g,'').trim();const dots=(s.match(/\./g)||[]).length,commas=(s.match(/,/g)||[]).length;if(dots>1)s=s.replace(/\./g,'').replace(',','.');else if(commas>1)s=s.replace(/,/g,'');else if(dots===1&&commas===1){s=s.indexOf('.')<s.indexOf(',')?s.replace('.','').replace(',','.'):s.replace(',','');}else if(commas===1){const af=s.split(',')[1]||'';s=af.length===3?s.replace(',',''):s.replace(',','.');}const n=parseFloat(s);return isNaN(n)?0:n;}
function normMonth(raw){if(!raw)return null;const s=String(raw).trim();if(/^\d{4}-\d{2}$/.test(s))return s;if(/^\d{6}$/.test(s))return s.slice(0,4)+'-'+s.slice(4);const m1=s.match(/^(\d{1,2})[\/\-](\d{4})$/);if(m1)return m1[2]+'-'+m1[1].padStart(2,'0');const m2=s.match(/^(\d{4})[\/\-](\d{2})$/);if(m2)return m2[1]+'-'+m2[2];const n=parseInt(s);if(!isNaN(n)&&n>40000&&n<55000){const d=new Date((n-25569)*86400*1000);return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0');}return null;}
function processCSV(text){
  if(!text||!text.trim())return{ok:false,msg:'El texto está vacío.'};
  const lines=text.split('\n').map(l=>l.replace(/\r$/,'')).filter(l=>l.trim());
  if(lines.length<2)return{ok:false,msg:'Se necesitan al menos 2 filas (encabezado + datos).'};
  const sep=detectSep(lines[0]);
  const headers=splitLine(lines[0],sep).map(h=>h.toUpperCase().replace(/[^A-Z0-9ÁÉÍÓÚ ]/gi,' ').trim());
  const find=keys=>headers.findIndex(h=>keys.some(k=>h.includes(k)));
  const iM=find(['MES','MONTH','FECHA','PERIODO','PERIOD','DATE']);
  const iB=find(['MARCA','BRAND','PRODUCTO','PRODUCT','ARTICULO','ITEM']);
  const iV=find(['VENTA','IMPORTE','MONTO','SALES','VALOR','AMOUNT','REVENUE','TOTAL','NET']);
  const iC=find(['CANAL','CHANNEL','TIPO']);
  const iZ=find(['ZONA','ZONE','REGION','TERRITORIO']);
  if(iM<0)return{ok:false,msg:`Columna MES no encontrada. Encabezados: ${headers.join(' | ')}`};
  if(iB<0)return{ok:false,msg:`Columna MARCA no encontrada. Encabezados: ${headers.join(' | ')}`};
  if(iV<0)return{ok:false,msg:`Columna VENTA no encontrada. Encabezados: ${headers.join(' | ')}`};
  const nm={},nch={},nz={};let ok=0,skip=0;
  for(let i=1;i<lines.length;i++){
    const r=splitLine(lines[i],sep);
    const mes=normMonth(r[iM]),brand=(r[iB]||'').trim().toUpperCase(),venta=parseNum(r[iV]);
    if(!mes||!brand){skip++;continue;}
    if(!nm[mes])nm[mes]={};nm[mes][brand]=(nm[mes][brand]||0)+venta;ok++;
    if(iC>=0){const raw=(r[iC]||'').trim().toUpperCase();const canal=raw.includes('FARM')?'FARMACIA':raw.includes('MUT')?'MUTUALES':raw.includes('EST')?'ESTADO':raw;if(canal){if(!nch[mes])nch[mes]={};nch[mes][canal]=(nch[mes][canal]||0)+venta;}}
    if(iZ>=0){const zona=(r[iZ]||'').trim().toUpperCase();if(zona){if(!nz[mes])nz[mes]={};nz[mes][zona]=(nz[mes][zona]||0)+venta;}}
  }
  const mCount=Object.keys(nm).length,bCount=[...new Set(Object.values(nm).flatMap(x=>Object.keys(x)))].length;
  if(mCount===0)return{ok:false,msg:`Se procesaron ${ok} filas pero ningún mes resultó válido. Formato esperado: YYYY-MM.`};
  return{ok:true,msg:`✅ ${ok} filas · ${mCount} meses · ${bCount} marcas${skip?` · ${skip} omitidas`:''}`,data:{monthly:nm,monthlyCh:Object.keys(nch).length?nch:MONTHLY_CH,monthlyZ:Object.keys(nz).length?nz:MONTHLY_Z}};
}

function drawBarChart(canvas,labels,datasets,opts={}){
  const dpr=window.devicePixelRatio||1,W=canvas.offsetWidth||600,H=opts.height||200;
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  const PAD={top:16,right:16,bottom:36,left:52},cW=W-PAD.left-PAD.right,cH=H-PAD.top-PAD.bottom;
  const allVals=datasets.flatMap(d=>d.data),minV=Math.min(0,...allVals),maxV=Math.max(0,...allVals)*1.12||1;
  const toY=v=>PAD.top+cH-(v-minV)/(maxV-minV)*cH,zero=toY(0);
  ctx.strokeStyle='#1e2130';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const v=minV+(maxV-minV)*i/4,y=toY(v);ctx.beginPath();ctx.moveTo(PAD.left,y);ctx.lineTo(PAD.left+cW,y);ctx.stroke();ctx.fillStyle='#555a75';ctx.font='10px DM Sans,sans-serif';ctx.textAlign='right';ctx.fillText(fmt(v),PAD.left-4,y+3);}
  ctx.strokeStyle='#2a2d3a';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(PAD.left,zero);ctx.lineTo(PAD.left+cW,zero);ctx.stroke();
  const n=labels.length,groupW=cW/n,barW=Math.max(4,groupW*0.55/datasets.length),totalBarW=barW*datasets.length;
  datasets.forEach((ds,di)=>{labels.forEach((lbl,i)=>{const v=ds.data[i]||0,x=PAD.left+i*groupW+(groupW-totalBarW)/2+di*barW,y=Math.min(toY(v),zero),barH=Math.abs(toY(v)-zero);ctx.fillStyle=typeof ds.color==='function'?ds.color(v,i):ds.color;ctx.beginPath();if(v>=0)ctx.roundRect(x,y,barW,Math.max(2,barH),2);else ctx.roundRect(x,zero,barW,Math.max(2,barH),2);ctx.fill();});});
  ctx.fillStyle='#555a75';ctx.font='10px DM Sans,sans-serif';ctx.textAlign='center';
  labels.forEach((lbl,i)=>ctx.fillText(lbl,PAD.left+i*groupW+groupW/2,H-PAD.bottom+14));
}
function drawLineChart(canvas,labels,datasets,opts={}){
  const dpr=window.devicePixelRatio||1,W=canvas.offsetWidth||600,H=opts.height||200;
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  const PAD={top:16,right:24,bottom:36,left:56},cW=W-PAD.left-PAD.right,cH=H-PAD.top-PAD.bottom;
  const allVals=datasets.flatMap(d=>d.data),minV=Math.min(0,...allVals),maxV=Math.max(...allVals)*1.1||1;
  const toX=i=>PAD.left+i/(labels.length-1||1)*cW,toY=v=>PAD.top+cH-(v-minV)/(maxV-minV)*cH;
  ctx.strokeStyle='#1e2130';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const v=minV+(maxV-minV)*i/4,y=toY(v);ctx.beginPath();ctx.moveTo(PAD.left,y);ctx.lineTo(PAD.left+cW,y);ctx.stroke();ctx.fillStyle='#555a75';ctx.font='10px DM Sans,sans-serif';ctx.textAlign='right';ctx.fillText(fmt(v),PAD.left-4,y+3);}
  datasets.forEach(ds=>{ctx.strokeStyle=ds.color;ctx.lineWidth=ds.width||2;if(ds.dash)ctx.setLineDash(ds.dash);else ctx.setLineDash([]);ctx.beginPath();ds.data.forEach((v,i)=>{if(i===0)ctx.moveTo(toX(i),toY(v));else ctx.lineTo(toX(i),toY(v));});ctx.stroke();});
  ctx.setLineDash([]);ctx.fillStyle='#555a75';ctx.font='10px DM Sans,sans-serif';ctx.textAlign='center';

function drawPieChart(canvas,data){
  const dpr=window.devicePixelRatio||1,S=180;

}

// ── ALERTS ──
function computeAlerts(months,MON){
  const alerts=[];if(months.length<3)return alerts;
  const last3=months.slice(-3),lastM=months[months.length-1];
  const allB=[...new Set(months.flatMap(m=>Object.keys(MON[m]||{})))];
  allB.forEach(b=>{
    const vals=last3.map(m=>MON[m]?.[b]??null);
    if(vals.every(v=>v!==null)){
      if(vals[0]>vals[1]&&vals[1]>vals[2]){const drop=((vals[2]-vals[0])/Math.abs(vals[0])*100).toFixed(1);alerts.push({level:'red',icon:'📉',brand:b,alertMonths:last3,title:`${b}: caída 3 meses consecutivos`,detail:`${fmt(vals[0])} → ${fmt(vals[1])} → ${fmt(vals[2])} (${drop}% acumulado)`});}
      if(vals[0]<vals[1]&&vals[1]<vals[2]){const gain=((vals[2]-vals[0])/Math.abs(vals[0])*100).toFixed(1);if(parseFloat(gain)>30)alerts.push({level:'green',icon:'🚀',title:`${b}: momentum positivo`,detail:`${fmt(vals[0])} → ${fmt(vals[1])} → ${fmt(vals[2])} (+${gain}% acumulado)`});}
    }
  });
  const tot=mTotal(lastM,MON);

function buildImportModal(){
  // Estado local del input
  let inputUrl = SHEETS_CSV_URL || '';

  function normalizeSheetUrl(url) {
    url = url.trim();
    // Caso 1: URL de edición normal → exportar como CSV
    // https://docs.google.com/spreadsheets/d/ID/edit...
    const editMatch = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
    // Caso 2: URL publicada /pub
    // https://docs.google.com/spreadsheets/d/e/PACX-ID/pub...
    const pubMatch = url.match(/\/spreadsheets\/d\/e\/([a-zA-Z0-9_-]+)\/pub/);

    if (pubMatch) {
      // Ya es URL publicada, normalizar a CSV
      return `https://docs.google.com/spreadsheets/d/e/${pubMatch[1]}/pub?output=csv`;
    } else if (editMatch) {
      // URL de edición: usar export
      return `https://docs.google.com/spreadsheets/d/${editMatch[1]}/export?format=csv`;
    } else if (url.includes('output=csv') || url.includes('format=csv')) {
      return url; // Ya está bien
    }
    return url; // Devolver tal cual como último recurso
  }

  async function fetchCSV(url) {
    let csvUrl = normalizeSheetUrl(url);

    // Intentar via Anthropic API como proxy (funciona dentro del iframe de Claude)
    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: `Fetch this URL and return ONLY the raw CSV text, nothing else, no explanation: ${csvUrl}`
          }]
        })
      });
      if (resp.ok) {
        const data = await resp.json();
        const text = data.content?.[0]?.text || '';
        if (text && text.length > 10 && !text.includes('<!DOCTYPE')) return text;
      }
    } catch(e) {}


    // Intentar proxies en orden hasta que uno funcione
    // Intentar fetch directo primero (funciona desde archivo local o servidor propio)
    const attempts = [
      () => fetch(csvUrl),
      () => fetch(csvUrl, {mode:'no-cors'}),
      () => fetch(`https://corsproxy.io/?${encodeURIComponent(csvUrl)}`),
      () => fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(csvUrl)}`),
    ];

    let lastErr = '';
    for (const attempt of attempts) {
      try {
        const resp = await attempt();
        // no-cors devuelve opaque response, no podemos leer el body — saltar
        if (resp.type === 'opaque') { lastErr = 'Respuesta opaca'; continue; }
        if (!resp.ok) { lastErr = `HTTP ${resp.status}`; continue; }
        const text = await resp.text();
        if (!text || text.trim().length < 10) { lastErr = 'Respuesta vacía'; continue; }
        if (text.includes('<!DOCTYPE') || text.includes('<html')) { lastErr = 'Recibí HTML — verificá que la planilla esté publicada'; continue; }
        return text;
      } catch(e) { lastErr = e.message; }
    }
    throw new Error(lastErr || 'No se pudo conectar.');
  }

  async function conectar(url) {
    url = url.trim();
    if (!url) { showErr('Pegá la URL de tu Google Sheets publicado.'); return; }
    setBtnLoading(true);
    try {
      const text = await fetchCSV(url);
      const res = processCSV(text);
      if (!res.ok) throw new Error(res.msg);

      SHEETS_CSV_URL = url;
      try { localStorage.setItem('sheets_url', url); } catch(e) {}

      STATE.customData = res.data;
      STATE.MON = res.data.monthly;
      STATE.MON_CH = res.data.monthlyCh;
      STATE.MON_Z = res.data.monthlyZ;
      STATE.sheetsOk = true;
      STATE.importMsg = {ok: true, msg: `☁️ Google Sheets conectado · ${res.msg}`};
      const ms = Object.keys(res.data.monthly).sort();
      if (ms.length) { STATE.from = ms[0]; STATE.to = ms[ms.length-1]; }
      STATE.showImport = false;
      render();
    } catch(e) {
      setBtnLoading(false);
      showErr(e.message);
    }
  }

  function showErr(msg) {
    const el = document.getElementById('sheets-err');
    if (el) { el.textContent = '⚠️ ' + msg; el.style.display = 'block'; }
  }
  function setBtnLoading(loading) {
    const btn = document.getElementById('sheets-connect-btn');
    if (btn) { btn.textContent = loading ? '⏳ Conectando...' : 'Conectar'; btn.disabled = loading; }
  }

  const inputEl = h('input', {
    type: 'text',
    id: 'sheets-url-input',
    placeholder: 'https://docs.google.com/spreadsheets/d/e/2PACX-.../pub?output=csv',
    style: {
      width: '100%', background: 'var(--bg0)', border: '1px solid #00d4aa44',
      borderRadius: '8px', color: 'var(--t1)', fontSize: '12px', padding: '10px 12px',
      outline: 'none', marginBottom: '10px', fontFamily: 'monospace'
    }
  });
  inputEl.value = inputUrl;
  inputEl.addEventListener('input', e => { inputUrl = e.target.value; });
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') conectar(inputUrl); });

  const errEl = h('div', {
    id: 'sheets-err',
    style: {display:'none', background:'#e6394615', border:'1px solid #e6394644',
      borderRadius:'8px', padding:'8px 12px', fontSize:'11px', color:'#e63946', marginBottom:'10px'}
  });

  const stepsEl = h('div', {
    style: {background:'var(--bg0)', border:'1px solid var(--bg2)', borderRadius:'8px',
      padding:'14px 16px', fontSize:'11px', color:'var(--t4)', lineHeight:'2', marginBottom:'14px'}
  });
  stepsEl.innerHTML = `
    <strong style="color:var(--orange)">Paso 1:</strong> Abrí tu Google Sheets<br>
    <strong style="color:var(--orange)">Paso 2:</strong> <em style="color:#7c83f5">Archivo → Compartir → Publicar en la web</em><br>
    <strong style="color:var(--orange)">Paso 3:</strong> Seleccioná <em style="color:#7c83f5">Hoja 1</em> · Formato: <em style="color:#7c83f5">CSV</em> → <strong style="color:#fff">Publicar</strong><br>
    <strong style="color:var(--orange)">Paso 4:</strong> Copiá la URL y pegála abajo
  `;

  const colMapEl = h('div', {
    style: {background:'var(--bg0)', border:'1px solid var(--bg2)', borderRadius:'8px',
      padding:'12px 16px', fontSize:'11px', color:'var(--t4)', lineHeight:'1.9', marginBottom:'14px'}
  });
  colMapEl.innerHTML = `
    <strong style="color:var(--t3)">Columnas detectadas automáticamente:</strong><br>
    <span style="color:#7c83f5">MES / FECHA / PERIODO</span> · 
    <span style="color:#7c83f5">MARCA / BRAND / PRODUCTO</span> · 
    <span style="color:#7c83f5">VENTA / IMPORTE / SALES</span><br>
    <em>Opcionales:</em> CANAL · ZONA
  `;

  const modal = h('div', {class:'modal'}, [
    h('h2', {}, '🔗 Conectar Google Sheets'),
    h('p', {class:'sub'}, 'Pegá cualquier URL de tu planilla — el dashboard la convierte automáticamente'),
    stepsEl,
    colMapEl,
    h('p', {style:{fontSize:'11px',color:'var(--t3)',marginBottom:'4px'}}, 'URL de Google Sheets:'),
    h('p', {style:{fontSize:'10px',color:'var(--t4)',marginBottom:'8px'}}, '✅ Acepta URL de edición, de publicación, o de exportación'),
    inputEl,
    errEl,
    h('div', {class:'modal-footer'}, [
      h('button', {class:'btn', onclick:()=>{STATE.showImport=false;render();}}, 'Cancelar'),
      h('button', {class:'btn-primary', id:'sheets-connect-btn', onclick:()=>conectar(inputUrl)}, 'Conectar')
    ])
  ]);

  return h('div', {class:'modal-bg', onclick:e=>{if(e.target.className==='modal-bg'){STATE.showImport=false;render();}}}, [modal]);
}

// Simple XLSX parser (shared strings + sheet1)
function parseXLSXSimple(buf){
  const u8=new Uint8Array(buf),dv=new DataView(buf),td=new TextDecoder('utf-8');
  function ru16(p){return dv.getUint16(p,true);}function ru32(p){return dv.getUint32(p,true);}
  let eocd=-1;for(let i=u8.length-22;i>=0;i--){if(u8[i]===0x50&&u8[i+1]===0x4B&&u8[i+2]===0x05&&u8[i+3]===0x06){eocd=i;break;}}
  if(eocd<0)throw new Error('ZIP inválido');
  const cdOff=ru32(eocd+16),cdSz=ru32(eocd+12);
  const files={};let pos=cdOff;
  while(pos<cdOff+cdSz){if(ru32(pos)!==0x02014B50)break;const fnl=ru16(pos+28),exl=ru16(pos+30),cml=ru16(pos+32),loff=ru32(pos+42),fn=td.decode(u8.slice(pos+46,pos+46+fnl));files[fn]=loff;pos+=46+fnl+exl+cml;}
  function readEntry(name){const off=files[name];if(off==null)return null;const fnl=ru16(off+26),exl=ru16(off+28),meth=ru16(off+8),csz=ru32(off+18),start=off+30+fnl+exl,data=u8.slice(start,start+csz);if(meth===0)return td.decode(data);throw new Error('Compresión DEFLATE: pegá como CSV por favor.');}
  const sheetKey=Object.keys(files).find(k=>/xl\/worksheets\/sheet1\.xml$/i.test(k));
  const ssKey=Object.keys(files).find(k=>/xl\/sharedStrings\.xml$/i.test(k));
  if(!sheetKey)throw new Error('No se encontró sheet1.xml');
  const sheetXml=readEntry(sheetKey),ssXml=ssKey?readEntry(ssKey):null;
  const ss=[];
  if(ssXml){const re=/<si>[\s\S]*?<\/si>/g;let m;while((m=re.exec(ssXml))!==null){ss.push((m[0].match(/<t[^>]*>([\s\S]*?)<\/t>/g)||[]).map(s=>s.replace(/<t[^>]*>/,'').replace(/<\/t>/,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')).join(''));}}
  const rows=[];const rowRe=/<row[^>]*>([\s\S]*?)<\/row>/g;let rm;
  while((rm=rowRe.exec(sheetXml))!==null){const cells=[];const cr=/<c\s([^>]*)>([\s\S]*?)<\/c>/g;let cm;
  while((cm=cr.exec(rm[1]))!==null){const attrs=cm[1],inner=cm[2],tM=attrs.match(/t="([^"]*)"/),rM=attrs.match(/r="([A-Z]+)\d+"/);let col=0;if(rM){for(let i=0;i<rM[1].length;i++)col=col*26+(rM[1].charCodeAt(i)-64);col--;}const vM=inner.match(/<v>([\s\S]*?)<\/v>/);let val=vM?vM[1]:null;if(val!==null&&tM&&tM[1]==='s')val=ss[parseInt(val)]||val;while(cells.length<col)cells.push(null);cells[col]=val;}if(cells.some(c=>c!==null))rows.push(cells);}
  return rows;
}

async function autoLoadSheets() {
  if (!SHEETS_CSV_URL) { render(); return; }
  STATE.importMsg = {ok: false, msg: '⏳ Conectando con Google Sheets...'};
  render();
  try {
    const proxies = [
      u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
      u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
      u => `https://cors-anywhere.herokuapp.com/${u}`,
    ];
    let csvUrl = normalizeSheetUrl(SHEETS_CSV_URL);
    let text = null, lastErr = '';
    for (const proxy of proxies) {
      try {
        const resp = await fetch(proxy(csvUrl), {headers:{'X-Requested-With':'XMLHttpRequest'}});
        if (!resp.ok) { lastErr=`HTTP ${resp.status}`; continue; }
        const t = await resp.text();
        if (!t || t.trim().length < 10 || t.includes('<!DOCTYPE')) { lastErr='Respuesta inválida'; continue; }
        text = t; break;
      } catch(e) { lastErr = e.message; }
    }
    if (!text) throw new Error(lastErr);
    const res = processCSV(text);
    if (!res.ok) throw new Error(res.msg);
    STATE.customData = res.data; STATE.MON = res.data.monthly;
    STATE.MON_CH = res.data.monthlyCh; STATE.MON_Z = res.data.monthlyZ;
    STATE.sheetsOk = true;
    STATE.importMsg = {ok: true, msg: `☁️ Google Sheets conectado · ${res.msg}`};
    const ms = Object.keys(res.data.monthly).sort();
    if (ms.length) { STATE.from = ms[0]; STATE.to = ms[ms.length-1]; }
  } catch(e) {
    STATE.importMsg = {ok: false, msg: '⚠️ No se pudo cargar Sheets: ' + e.message + ' — mostrando datos locales.'};
  }
  render();
}
document.addEventListener('DOMContentLoaded', autoLoadSheets);
